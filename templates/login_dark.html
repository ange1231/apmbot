<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#080809">
  <title>Вход — APM Panel</title>
  <link rel="stylesheet" href="/static/style.css?v=2">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>

<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-logo">
      <img src="/static/logoSblack.png" alt="Logo">
      <div class="login-logo-title">APM Panel</div>
      <div class="login-logo-sub">Система управления ганпаками</div>
    </div>

    <!-- Flash messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="apm-alert apm-alert-{{ 'error' if category == 'error' else 'success' }}" style="margin-bottom:1.2rem;">
            <i class="fas {% if category == 'error' %}fa-circle-exclamation{% else %}fa-circle-check{% endif %}"></i>
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <!-- TG auth loader -->
    <div id="auth-container" class="login-spinner">
      <div class="spinner-ring"></div>
      <span>Проверка Telegram...</span>
    </div>

    <!-- Manual login form -->
    <form id="login-form" method="POST" style="display:none;">
      <div class="form-group">
        <label class="form-label">Логин</label>
        <input type="text" name="username" class="form-control"
               placeholder="Введите логин" autocomplete="username">
      </div>
      <div class="form-group" style="margin-bottom:1.4rem;">
        <label class="form-label">Пароль</label>
        <input type="password" name="password" class="form-control"
               placeholder="••••••••" autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-glass-primary btn-full" style="padding:0.65rem; font-size:12px;">
        <i class="fas fa-right-to-bracket"></i> Войти
      </button>
    </form>

  </div>
</div>

<script>
  const tg = window.Telegram?.WebApp;
  if (tg) {
    tg.ready();
    tg.expand();
    tg.setHeaderColor('#080809');
    tg.setBackgroundColor('#080809');
  }

  function showForm() {
    document.getElementById('auth-container').style.display = 'none';
    document.getElementById('login-form').style.display = 'block';
  }

  if (tg && tg.initData) {
    fetch('/auth-tg', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ initData: tg.initData })
    })
    .then(r => r.json())
    .then(d => { if (d.success) window.location.href = '/dashboard'; else showForm(); })
    .catch(() => showForm());
  } else {
    showForm();
  }
</script>
</body>
</html>
