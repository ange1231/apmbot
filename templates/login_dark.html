<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в APM Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .login-card {
            background: #1e293b;
            padding: 2rem;
            border-radius: 1rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 400px;
            border: 1px solid #334155;
        }
        .form-control {
            background-color: #0f172a;
            border: 1px solid #334155;
            color: white;
        }
        .form-control:focus {
            background-color: #0f172a;
            color: white;
            border-color: #38bdf8;
            box-shadow: 0 0 0 0.25rem rgba(56, 189, 248, 0.25);
        }
        .btn-primary {
            background-color: #38bdf8;
            border: none;
            font-weight: 600;
        }
        .btn-primary:hover {
            background-color: #0ea5e9;
        }
        /* Стили для лоадера */
        .loader {
            border: 3px solid #334155;
            border-top: 3px solid #38bdf8;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        #auth-container { display: block; text-align: center; }
        #login-form { display: none; } /* Скрыто по умолчанию */
    </style>
</head>
<body>
    <div class="login-card">
        <h3 class="text-center mb-4">APM Dashboard</h3>
        
        <div id="auth-container">
            <div class="loader"></div>
            <p class="text-muted small">Проверка доступа через Telegram...</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <div id="flash-messages">
                {% for category, message in messages %}
                  <div class="alert alert-{{ 'danger' if category == 'error' else 'success' }} py-2 small">{{ message }}</div>
                {% endfor %}
            </div>
          {% endif %}
        {% endwith %}

        <form id="login-form" method="POST">
            <div class="mb-3 text-start">
                <label class="form-label small">Логин</label>
                <input type="text" name="username" class="form-control" placeholder="Введите логин">
            </div>
            <div class="mb-3 text-start">
                <label class="form-label small">Пароль</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary w-100 mt-2">Войти</button>
        </form>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        function showLoginForm() {
            document.getElementById('auth-container').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }

        // Логика авторизации
        if (tg.initData) {
            fetch('/auth-tg', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ initData: tg.initData })
            })
            .then(response => response.json())
            .then(data => {
                if (data.success) {
                    // Если авторизация успешна, перекидываем на главную
                    window.location.href = "{{ url_for('dashboard') }}";
                } else {
                    // Если ошибка (например, юзер не админ)
                    showLoginForm();
                }
            })
            .catch(() => {
                showLoginForm();
            });
        } else {
            // Если открыто не из Telegram
            showLoginForm();
        }
    </script>
</body>
</html>
